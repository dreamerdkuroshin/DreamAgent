version: "3.9"

services:
  dragonfly:
    image: docker.dragonflydb.io/dragonflydb/dragonfly
    ports:
      - "6379:6379"

  backend:
    build:
      context: .
      dockerfile: backend/Containerfile
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      - dragonfly
    environment:
      - REDIS_URL=redis://dragonfly:6379/0
      - PYTHONPATH=/app

  worker:
    build:
      context: .
      dockerfile: backend/Containerfile
    command: python worker.py
    volumes:
      - .:/app
    depends_on:
      - dragonfly
    environment:
      - REDIS_URL=redis://dragonfly:6379/0
      - PYTHONPATH=/app

  frontend:
    build:
      context: ./frontend of dreamAgent/DreamAgent-v10-UI/artifacts/dream-agent
    command: pnpm dev --host 0.0.0.0
    ports:
      - "5000:5000"
    volumes:
      - ./frontend of dreamAgent/DreamAgent-v10-UI/artifacts/dream-agent:/app
    depends_on:
      - backend
